<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Save The Date</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f7f2e8;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Cormorant Garamond', serif;
}

/* CARD */

.card{
    width:390px;
    height:760px;
    background:#fcfaf5;
    position:relative;
    overflow:hidden;
    border-radius:24px;
    box-shadow:0 18px 45px rgba(0,0,0,0.16);
    padding:42px 28px;
    text-align:center;
}

/* SAVE TEXT */

.save{
    font-size:50px;
    color:#cdb164;
    font-style:italic;
    font-weight:300;
    margin-top:8px;
    letter-spacing:1px;
}

/* NAMES */

.names{
    margin-top:28px;
    font-size:42px;
    color:#111;
    font-weight:400;
    white-space:nowrap;
}

.names span{
    color:#d2b76a;
    padding:0 10px;
}

/* SCRATCH TEXT */

.scratch-text{
    margin-top:14px;
    letter-spacing:6px;
    color:#d2be88;
    font-size:14px;
}

/* HEART WRAP */

.heart-wrap{
    margin-top:32px;
    position:relative;
    width:300px;
    height:300px;
    margin-left:auto;
    margin-right:auto;
}

/* INVITATION HEART */

.invitation-heart{
    position:absolute;
    inset:0;
    background:#f9f2df;
    clip-path:path("M150 280 C150 280 10 180 10 90 C10 20 80 0 150 60 C220 0 290 20 290 90 C290 180 150 280 150 280 Z");
    border:2px solid #d8bf79;
    z-index:1;
}

/* INVITATION CONTENT */

.invite-text{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    width:220px;
    z-index:2;
    color:#6d6d6d;
}

.invite-text h4{
    font-size:16px;
    font-weight:400;
    line-height:1.5;
}

.invite-text h2{
    margin-top:16px;
    font-size:34px;
    color:#111;
    font-weight:600;
    line-height:1.2;
}

/* SCRATCH HEART */

#scratch{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:5;
    cursor:pointer;
}

/* LOCATION */

.location{
    margin-top:20px;
    color:#111;
    font-size:24px;
    font-style:italic;
    line-height:1.4;
}

/* BOTTOM */

.bottom{
    margin-top:15px;
    letter-spacing:5px;
    color:#cdb164;
    font-size:10px;
}

/* GOLD PARTICLES */

.particle{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:gold;
    pointer-events:none;
    animation:explode 1.6s ease-out forwards;
    z-index:20;
}

@keyframes explode{

    0%{
        transform:translate(0,0) scale(1);
        opacity:1;
    }

    100%{
        transform:translate(var(--x), var(--y)) scale(0);
        opacity:0;
    }
}

/* FLOATING SPARKLES */

.sparkle{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:#e7cf85;
    opacity:0.5;
    animation:float 6s infinite ease-in-out;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-14px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* MUSIC BUTTON */

.music-btn{
    position:absolute;
    top:20px;
    right:20px;
    width:40px;
    height:40px;
    border-radius:50%;
    background:#d4b567;
    border:none;
    color:white;
    font-size:22px;
    cursor:pointer;
    z-index:50;
    box-shadow:0 6px 18px rgba(0,0,0,0.15);
    transition:0.3s;
}

.music-btn:hover{
    transform:scale(1.05);
}

.music-btn.paused{
    opacity:0.6;
}

/* MOBILE */

@media(max-width:480px){

    .card{
        width:100vw;
        height:100vh;
        border-radius:0;
    }

    .save{
        font-size:48px;
    }

    .names{
        font-size:36px;
    }

    .heart-wrap{
        width:280px;
        height:280px;
    }

    .location{
        font-size:22px;
    }
}

</style>
</head>

<body>

<div class="card">

    <!-- MUSIC BUTTON -->

    <button class="music-btn" id="musicBtn">
        ♫
    </button>

    <!-- TITLE -->

    <div class="save">
        Save the Date
    </div>

    <!-- NAMES -->

    <div class="names">
        Rohan <span>&</span> Aditi
    </div>

    <!-- SCRATCH TEXT -->

    <div class="scratch-text">
        SCRATCH TO REVEAL
    </div>

    <!-- HEART -->

    <div class="heart-wrap">

        <!-- INVITATION HEART -->

        <div class="invitation-heart"></div>

        <!-- INVITE TEXT -->

        <div class="invite-text">

            <h4>
                We invite you to celebrate our wedding on
            </h4>

            <h2>
                20 June 2026
            </h2>

        </div>

        <!-- SCRATCH CANVAS -->

        <canvas id="scratch"></canvas>

    </div>

    <!-- LOCATION -->

    <div class="location">
        Venue : Roche Harbor,Ramgarh
    </div>

    <!-- BOTTOM -->

    <div class="bottom">
        FORMAL INVITATION TO FOLLOW
    </div>

</div>

<!-- AUDIO -->

<audio id="bgmusic" autoplay loop playsinline>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

/* CANVAS */

const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d");

const wrapper = document.querySelector(".heart-wrap");

canvas.width = wrapper.offsetWidth;
canvas.height = wrapper.offsetHeight;

/* HEART SHAPE */

ctx.save();

ctx.beginPath();

ctx.moveTo(150,280);

ctx.bezierCurveTo(150,280,10,180,10,90);
ctx.bezierCurveTo(10,20,80,0,150,60);
ctx.bezierCurveTo(220,0,290,20,290,90);
ctx.bezierCurveTo(290,180,150,280,150,280);

ctx.closePath();

ctx.clip();

/* GOLD LAYER */

const goldGradient = ctx.createLinearGradient(0,0,300,300);

goldGradient.addColorStop(0,"#f4e4a3");
goldGradient.addColorStop(0.5,"#d6b35e");
goldGradient.addColorStop(1,"#fff0b5");

ctx.fillStyle = goldGradient;
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.restore();

/* SCRATCH EFFECT */

ctx.globalCompositeOperation = "destination-out";

let isDrawing = false;

function getPosition(e){

    const rect = canvas.getBoundingClientRect();

    if(e.touches){

        return{
            x:e.touches[0].clientX - rect.left,
            y:e.touches[0].clientY - rect.top
        };
    }

    return{
        x:e.clientX - rect.left,
        y:e.clientY - rect.top
    };
}

function scratch(e){

    if(!isDrawing) return;

    e.preventDefault();

    const pos = getPosition(e);

    ctx.beginPath();
    ctx.arc(pos.x,pos.y,24,0,Math.PI*2);
    ctx.fill();

    createParticles(pos.x,pos.y);
}

/* EVENTS */

canvas.addEventListener("mousedown", ()=> isDrawing=true);
canvas.addEventListener("mouseup", ()=> isDrawing=false);
canvas.addEventListener("mouseleave", ()=> isDrawing=false);
canvas.addEventListener("mousemove", scratch);

canvas.addEventListener("touchstart", ()=> isDrawing=true);
canvas.addEventListener("touchend", ()=> isDrawing=false);
canvas.addEventListener("touchmove", scratch);

/* PARTICLES */

function createParticles(x,y){

    for(let i=0;i<12;i++){

        const particle = document.createElement("div");

        particle.classList.add("particle");

        particle.style.left = x + "px";
        particle.style.top = y + "px";

        particle.style.setProperty(
            "--x",
            (Math.random()*240 - 120) + "px"
        );

        particle.style.setProperty(
            "--y",
            (Math.random()*240 - 120) + "px"
        );

        wrapper.appendChild(particle);

        setTimeout(()=>{
            particle.remove();
        },1600);
    }
}

/* FLOATING SPARKLES */

for(let i=0;i<25;i++){

    const sparkle = document.createElement("div");

    sparkle.classList.add("sparkle");

    sparkle.style.left = Math.random()*100 + "%";
    sparkle.style.top = Math.random()*100 + "%";

    sparkle.style.animationDuration =
        (Math.random()*4 + 4) + "s";

    document.querySelector(".card")
        .appendChild(sparkle);
}

/* MUSIC AUTOPLAY + TOGGLE */

const music = document.getElementById("bgmusic");
const musicBtn = document.getElementById("musicBtn");

/* FORCE AUTOPLAY */

window.addEventListener("load", () => {

    const playPromise = music.play();

    if(playPromise !== undefined){

        playPromise
        .then(() => {

            musicBtn.classList.remove("paused");

        })
        .catch(() => {

            /* MOBILE BROWSER BLOCKED AUTOPLAY */

            document.body.addEventListener("click", startMusicOnce);

        });
    }
});

/* START MUSIC AFTER FIRST TAP */

function startMusicOnce(){

    music.play();

    musicBtn.classList.remove("paused");

    document.body.removeEventListener(
        "click",
        startMusicOnce
    );
}

/* TOGGLE MUSIC */

musicBtn.addEventListener("click", () => {

    if(music.paused){

        music.play();
        musicBtn.classList.remove("paused");

    }else{

        music.pause();
        musicBtn.classList.add("paused");
    }
});

</script>

</body>
</html>
